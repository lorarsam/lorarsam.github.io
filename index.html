<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de Memoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header class="hud" aria-label="Estado del juego">
    <p>Level <span id="nivel">1</span></p>
    <p>Pairs: <span id="pares">0/8</span></p>
    <p>Attempts: <span id="movimientos">0</span></p>
  </header>

  <main class="game" aria-labelledby="titulo">
    <h1 id="titulo" class="sr-only">Juego de Memoria</h1>

    <label class="name-box" for="nombre">
      <span class="sr-only">Nombre del jugador</span>
      <input id="nombre" type="text" autocomplete="off" placeholder="Tu nombre">
    </label>

    <section class="controls" aria-label="Controles del juego">
      <button id="iniciar" type="button" class="btn btn-start">▶ Start</button>
      <button id="audio-toggle" type="button" class="btn audio-btn" aria-label="Silenciar musica"></button>
    </section>

    <p id="mensaje" class="message" aria-live="polite"></p>

    <section class="play-area">
      <section id="tablero" class="board" aria-label="Tablero de cartas"></section>

      <aside class="history-panel" aria-labelledby="historial-titulo">
        <h2 id="historial-titulo">Historial</h2>
        <ol id="historial" class="history-list"></ol>
      </aside>
    </section>

    <nav id="niveles" class="level-nav" aria-label="Selector de dificultad"></nav>
  </main>
</body>
</html>
