<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Memoria — versión a auditar</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:540px;margin:40px auto;padding:0 16px;color:#222}
  h1{font-size:1.4rem}
  .fila{display:flex;gap:8px;margin-bottom:16px}
  input{flex:1;padding:8px 10px;font-size:1rem;border:1px solid #bbb;border-radius:6px}
  button{padding:8px 12px;font-size:1rem;cursor:pointer;border:1px solid #888;border-radius:6px;background:#f3f3f3}
  #tablero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}
  .carta{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;background:#2b3a42;color:#fff;border-radius:10px;cursor:pointer;user-select:none}
  .carta.volteada{background:#e8eef0;color:#222}
  .carta.encontrada{background:#cdebd7;color:#222;cursor:default}
  #movimientos{color:#666;font-size:.9rem;margin-top:14px}
  #mensaje{font-size:1.1rem;font-weight:600;margin-top:8px}
</style>
</head>
<body>
<h1>Juego de Memoria</h1>

<div class="fila">
  <input id="nombre" placeholder="Tu nombre...">
  <button id="iniciar">Iniciar / Reiniciar</button>
</div>

<div id="tablero"></div>
<p id="movimientos"></p>
<p id="mensaje"></p>

<!--
  ============================================================
  CÓDIGO PARA AUDITAR (Parte 2)
  Este juego de memoria "funciona", pero tiene bugs y malas prácticas.
  Si juegas despacio parece correcto; pruébalo con clicks rápidos,
  doble click sobre una misma carta, o un nombre raro.

  Tu tarea: encontrar los problemas, corregirlos y explicar POR QUÉ
  estaban mal. Comenta tus correcciones con  // BUG: ...  y  // FIX: ...
  Debe haber, al menos:
    - 1 bug funcional
    - 1 problema de seguridad
    - 1 olor de arquitectura / rendimiento
  (En realidad hay más.)
  ============================================================
-->
<script>
  const EMOJIS = ['🍎', '🚀', '🐱', '🌵', '🎲', '🎧', '⚽', '🍕']; // 8 pares = 16 cartas

  // BUG: el estado queda repartido en varias variables sueltas, entonces es más fácil perder el control del flujo.
  // FIX: sería mejor usar un objeto state como fuente única de verdad para cartas, volteadas, movimientos y bloqueo.
  let cartas = [];      // estado del mazo
  let volteadas = [];   // índices volteados en el turno actual
  let movimientos = 0;
  let nombre = '';

  const tablero = document.getElementById('tablero');

  document.getElementById('iniciar').addEventListener('click', function () {
    nombre = document.getElementById('nombre').value;
    cartas = [];
    EMOJIS.forEach(function (e) {
      cartas.push({ emoji: e, encontrada: false });
      cartas.push({ emoji: e, encontrada: false });
    });
    // BUG: este sort con Math.random() funciona "más o menos", pero no es un barajado confiable.
    // FIX: usar Fisher-Yates sería más correcto para mezclar el mazo.
    cartas.sort(function () { return Math.random() - 0.5; });
    volteadas = [];
    movimientos = 0;
    document.getElementById('mensaje').textContent = '';
    render();
  });

  function render() {
    // BUG: aquí se usa innerHTML para limpiar el tablero, aunque no hace falta.
    // FIX: replaceChildren() sería más seguro y calza mejor con renderizar usando nodos DOM.
    tablero.innerHTML = '';
    for (let i = 0; i < cartas.length; i++) {
      const div = document.createElement('div');
      div.className = 'carta';
      div.dataset.indice = i;
      div.textContent = cartas[i].encontrada ? cartas[i].emoji : '?';
      // BUG: se agrega un listener por cada carta cada vez que se renderiza el tablero.
      // FIX: usar delegación de eventos con un solo listener en #tablero.
      div.addEventListener('click', function () {
        voltearCarta(div);
      });
      tablero.appendChild(div);
    }
    document.getElementById('movimientos').textContent = 'Movimientos: ' + movimientos;
  }

  function voltearCarta(div) {
    const i = Number(div.dataset.indice);
    // BUG: falta validar si el tablero está bloqueado, si la carta ya está encontrada o si ya fue volteada.
    // FIX: cortar la función al inicio cuando state.bloqueado sea true o cuando la carta no se pueda jugar.
    div.textContent = cartas[i].emoji;
    div.classList.add('volteada');
    // BUG: un doble click sobre la misma carta mete el mismo índice dos veces en volteadas.
    // FIX: antes de hacer push habría que revisar si volteadas ya incluye este índice.
    volteadas.push(i);

    if (volteadas.length === 2) {
      movimientos++;
      document.getElementById('movimientos').textContent = 'Movimientos: ' + movimientos;

      const a = volteadas[0];
      const b = volteadas[1];
      // BUG: se usa el DOM para decidir la lógica del juego.
      // FIX: comparar desde el estado, por ejemplo cartas[a].emoji === cartas[b].emoji.
      const divs = tablero.children;

      // BUG: si a y b son el mismo índice, la carta puede hacer pareja consigo misma.
      // FIX: validar que a !== b antes de comparar.
      if (divs[a].textContent === divs[b].textContent) {
        cartas[a].encontrada = true;
        cartas[b].encontrada = true;
        divs[a].classList.add('encontrada');
        divs[b].classList.add('encontrada');
        volteadas = [];
        revisarVictoria();
      } else {
        // BUG: durante este retardo todavía se puede hacer click en más cartas y romper el turno.
        // FIX: activar un bloqueo antes del setTimeout y quitarlo cuando termine.
        setTimeout(function () {
          divs[a].textContent = '?';
          divs[b].textContent = '?';
          divs[a].classList.remove('volteada');
          divs[b].classList.remove('volteada');
          volteadas = [];
        }, 800);
      }
    }
  }

  function revisarVictoria() {
    const todasEncontradas = cartas.every(function (c) { return c.encontrada; });
    if (todasEncontradas) {
      // BUG: innerHTML mezcla texto del usuario con HTML; si el nombre trae etiquetas puede generar XSS.
      // FIX: usar textContent para mostrar el nombre como texto normal, sin interpretarlo como HTML.
      document.getElementById('mensaje').innerHTML = '¡Ganaste, ' + nombre + '! 🎉';
    }
  }
</script>
</body>
</html>
